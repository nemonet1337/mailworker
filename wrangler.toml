# wrangler.toml
name = 'mailworker'
main = "src/index.tsx"
compatibility_date = "2026-05-18"

# カスタムドメイン
#routes = [
#  { pattern = "webmail.example.com/*", custom_domain = true }
#]

[vars]
MAIL_DOMAIN = "nemonet.work"

# D1 データベース
# 初回セットアップ: wrangler d1 create mail-app-db
# 出力された database_id をここに設定してください
[[d1_databases]]
binding        = "DB"
database_name  = "mail-app-db"
database_id    = "cd9065b5-6df6-4f6a-b9e7-e40106c9ace6"
migrations_dir = "migrations"

# R2 バケット (添付ファイル保存)
# 初回セットアップ: wrangler r2 bucket create mailworker-bucket
[[r2_buckets]]
binding     = "BUCKET"
bucket_name = "mailworker-bucket"

# メール送信 (Cloudflare Email Workers)
# Cloudflare ダッシュボードで Email Routing を有効にしてください
[[send_email]]
name = "SEND_EMAIL"

# レートリミッター (ブルートフォース対策)
# Cloudflare ダッシュボードで Rate Limiting ルールを作成し namespace_id を設定してください
[[unsafe.bindings]]
name         = "RATE_LIMITER"
type         = "ratelimit"
namespace_id = "1001"

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = true
persist = true
head_sampling_rate = 1
