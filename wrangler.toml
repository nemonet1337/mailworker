# wrangler.toml
name = 'mailworker'
main = "src/index.tsx"
compatibility_date = "2026-05-18"

# カスタムドメイン
#routes = [
#  { pattern = "webmail.hogepiyo.nemo/*", custom_domain = true }
#]

[vars]
MAIL_DOMAIN = "hogepiyo.nemo"

[[d1_databases]]
binding        = "DB"
database_name  = "mail-app-db"
#database_id    = "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"
migrations_dir = "migrations"

[[r2_buckets]]
binding     = "BUCKET"
bucket_name = "mailworker-bucket"

[observability.logs]
enabled = false
invocation_logs = true

[observability.traces]
enabled = false
