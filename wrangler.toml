name        = "mail-app"
main        = "src/index.tsx"
compatibility_date = "2024-09-23"

[build]
command = "npm run build"

[[d1_databases]]
binding       = "DB"
database_name = "mail-app-db"
database_id   = "77db1f7b-bc29-4422-9fa1-f1fa45ca1320"
migrations_dir = "migrations"

[vars]
MAIL_DOMAIN = "yourdomain.com"

# JWT_SECRET は wrangler secret で管理 (平文でコミットしない)
# wrangler secret put JWT_SECRET
