name        = "mail-app"
main        = "src/index.tsx"
compatibility_date = "2026-05-18"

[[d1_databases]]
binding        = "DB"
database_name  = "mail-app-db"
database_id    = "YOUR_D1_DATABASE_ID"
migrations_dir = "migrations"

[[r2_buckets]]
binding     = "BUCKET"
bucket_name = "YOUR_R2_BUCKET_NAME"

[vars]
MAIL_DOMAIN = "yourdomain.com"

# JWT_SECRET は wrangler secret で管理 (平文でコミットしない)
# wrangler secret put JWT_SECRET

# メール受信ルーティング
# Cloudflare Email Routing ダッシュボードで
# "Catch-all" または特定アドレス → このWorker を設定すること
[[send_email]]
name = "SEND_EMAIL"

[[unsafe.bindings]]
type         = "ratelimit"
name         = "RATE_LIMITER"
namespace_id = "1001"
simple       = { limit = 5, period = 60 }
