# wrangler.toml
name = 'mailworker'
main = "src/index.tsx"
compatibility_date = "2026-05-18"

# カスタムドメイン
#routes = [
#  { pattern = "webmail.hogepiyo.nemo/*", custom_domain = true }
#]

[vars]
MAIL_DOMAIN = "nemonet.work"

[[d1_databases]]
binding        = "DB"
database_name  = "mail-app-db"
database_id    = "cd9065b5-6df6-4f6a-b9e7-e40106c9ace6"
migrations_dir = "migrations"

[[r2_buckets]]
binding     = "BUCKET"
bucket_name = "mailworker-bucket"

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = true
persist = true
head_sampling_rate = 1
